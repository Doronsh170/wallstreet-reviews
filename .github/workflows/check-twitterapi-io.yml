name: Generate Market Review

on:
  workflow_dispatch:
    inputs:
      review_type:
        description: "איזו סקירה ליצור"
        required: true
        default: "wallstreet"
        type: choice
        options:
          - wallstreet
          - israel
          - trump

permissions:
  contents: write

jobs:
  generate-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review
        env:
          REVIEW_TYPE: ${{ github.event.inputs.review_type }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_MODEL: gpt-5.5
          MAX_TWEETS_FOR_REVIEW: "12"
          MAX_TWEETS_PER_ACCOUNT: "4"
        run: python scripts/check_x_api.py

      - name: Commit latest review to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/ || true
          git commit -m "Update market review" || echo "No changes to commit"
          git push

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-review-output
          path: output/
