name: Check TwitterAPI.io

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-twitterapi-io:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_MODEL: gpt-5.5
          MAX_TWEETS_FOR_REVIEW: "10"
          MAX_TWEETS_PER_ACCOUNT: "4"
        run: python scripts/check_x_api.py

      - name: Commit latest review to website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet && echo "No review changes to commit" || git commit -m "Update latest Wall Street review"
          git push

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallstreet-review-output
          path: output/
