<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>טעימת שוק | Market Desk</title>
  <style>
    :root{
      --bg:#f4f6f8;--paper:#fff;--ink:#111827;--muted:#6b7280;--line:#d8dee8;
      --brand:#073b4c;--brand2:#0b556b;--accent:#0f766e;--soft:#eef6f7;
    }
    *{box-sizing:border-box;font-family:Arial, sans-serif!important}
    body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65}
    .top{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 16px 14px;border-bottom:4px solid #19a7a5}
    .top-inner{max-width:1050px;margin:auto;display:flex;gap:14px;align-items:center;justify-content:space-between}
    .brand h1{margin:0;font-size:24px;letter-spacing:-.4px}.brand p{margin:2px 0 0;color:#d7edf2;font-size:13px}.badge{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#bde7ef}
    .wrap{max-width:1050px;margin:0 auto;padding:16px}
    .tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 12px;position:sticky;top:0;background:var(--bg);z-index:5}
    .tab{white-space:nowrap;border:1px solid var(--line);background:#fff;color:#263241;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}
    .tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
    button,.action{border:1px solid var(--line);background:#fff;color:#14212f;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    button.primary,.action.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;min-width:220px}
    .status{color:var(--muted);font-size:13px;margin:4px 0 12px}
    .paper{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 22px rgba(15,23,42,.06);padding:22px;margin-bottom:18px}
    .review h1{font-size:26px;margin:0 0 6px;color:#0b2e3b}.review h2{font-size:19px;border-top:1px solid var(--line);padding-top:16px;margin:22px 0 10px;color:#0b2e3b}.review p{margin:0 0 12px}.review ul{margin:0 0 14px;padding:0 22px 0 0}.review li{margin:0 0 10px}.review strong{font-weight:800}.review .ticker{color:inherit;font-weight:inherit;opacity:1;background:none}.empty{padding:26px;text-align:center;color:var(--muted)}
    details.section{border:1px solid var(--line);border-radius:14px;margin:12px 0;background:#fff;overflow:hidden}details.section summary{cursor:pointer;padding:14px 16px;font-weight:800;color:#0b2e3b;background:#f9fbfc}details.section .section-content{padding:16px}
    .footer{font-size:12px;text-align:center;color:#667085;margin:20px 0 8px}.disclaimer{border-top:1px solid var(--line);padding-top:12px;margin-top:16px;color:#4b5563;font-size:13px;text-align:center}
    @media(max-width:720px){.top-inner{display:block}.brand h1{font-size:22px}.wrap{padding:12px}.toolbar{display:grid;grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1;width:100%;min-width:0}.paper{padding:16px;border-radius:14px}.review h1{font-size:22px}.review h2{font-size:17px}.hide-mobile{display:none!important}}
    @media print{.top,.tabs,.toolbar,.status{display:none!important}body{background:#fff}.wrap{max-width:none;padding:0}.paper{box-shadow:none;border:none}.footer{display:block}}
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="brand"><div class="badge">MARKET UPDATE</div><h1>טעימת שוק 🌅</h1><p>סקירות שוק קצרות, ממוקדות ומוכנות לקריאה ושיתוף</p></div>
      <div id="updated" class="badge"></div>
    </div>
  </header>

  <main class="wrap">
    <nav class="tabs" id="tabs"></nav>
    <div class="toolbar">
      <a class="action primary" id="runLink" target="_blank" rel="noopener">יצירת סקירה חדשה</a>
      <button id="loadBtn">טעינת הסקירה האחרונה</button>
      <button id="shortBtn">קיצור ל-5 נקודות</button>
      <button id="whatsappBtn">שליחה בווטסאפ</button>
      <button id="pdfBtn">שמירה ל-PDF</button>
      <input id="search" placeholder="חיפוש בסקירה" />
    </div>
    <div class="status" id="status">טוען סקירה...</div>
    <article class="paper review" id="review"></article>
    <div class="footer">
      <div class="disclaimer">⚠️ גילוי נאות: תוכן זה נוצר באמצעות AI לצרכים אינפורמטיביים בלבד. אין באמור ייעוץ השקעות או המלצה לפעולה בניירות ערך.</div>
      <div style="margin-top:8px;font-weight:700">פותח ע"י דורון שרייבמן</div>
    </div>
  </main>
<script>
const CHANNELS={
  wallstreet:{label:'וול סטריט',path:'output/wallstreet/latest.md',fallback:'output/latest.md'},
  israel:{label:'ישראל',path:'output/israel/latest.md'},
  trump:{label:'טראמפ',path:'output/trump/latest.md'}
};
const ACTIONS_URL='https://github.com/Doronsh170/wallstreet-reviews/actions/workflows/check-twitterapi-io.yml';
let active='wallstreet', raw='', rendered='';
const rtlMark='\u200F';
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function stripFooter(md){return md.replace(/⚠️?\s*גילוי נאות:[\s\S]*$/m,'').replace(/פותח ע["׳']?י דורון שרייבמן/g,'').trim()}
function normalize(md){return stripFooter(md).replace(/\r/g,'').replace(/\n{3,}/g,'\n\n').trim()}
function inline(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\$[A-Z]{1,6}/g,m=>`<span class="ticker">${m}</span>`)}
function mdToHtml(md){
  md=normalize(md); let lines=md.split('\n'); let html='', inList=false;
  const close=()=>{if(inList){html+='</ul>';inList=false}}
  for(let line of lines){line=line.trim(); if(!line) {close(); continue}
    if(line.startsWith('# ')){close(); html+=`<h1>${inline(line.slice(2))}</h1>`; continue}
    if(line.startsWith('## ')){close(); html+=`<h2>${inline(line.slice(3))}</h2>`; continue}
    if(line.startsWith('•')||line.startsWith('- ')){ if(!inList){html+='<ul>';inList=true} html+=`<li>${inline(line.replace(/^•\s*/, '').replace(/^-\s*/, ''))}</li>`; continue}
    close(); html+=`<p>${inline(line)}</p>`;
  }
  close(); return html;
}
function applyMobileSections(){
  const el=document.getElementById('review'); const heads=[...el.querySelectorAll('h2')];
  heads.forEach((h,i)=>{let nodes=[]; let n=h.nextSibling; while(n && !(n.nodeType===1 && n.tagName==='H2')){let next=n.nextSibling; nodes.push(n); n=next}
    const d=document.createElement('details'); d.className='section'; if(i===0 || window.innerWidth>720)d.open=true;
    const s=document.createElement('summary'); s.innerHTML=h.innerHTML; const c=document.createElement('div'); c.className='section-content'; nodes.forEach(x=>c.appendChild(x)); d.append(s,c); h.replaceWith(d);
  })
}
function render(md){raw=normalize(md); rendered=mdToHtml(raw); document.getElementById('review').innerHTML=rendered; applyMobileSections(); document.getElementById('updated').textContent='עודכן: '+new Date().toISOString().slice(0,10);}
async function load(){
  const cfg=CHANNELS[active]; document.getElementById('status').textContent='טוען סקירה...';
  for(const p of [cfg.path,cfg.fallback].filter(Boolean)){
    try{const r=await fetch(p+'?v='+Date.now()); if(r.ok){const t=await r.text(); render(t); document.getElementById('status').textContent='הסקירה נטענה'; return}}
    catch(e){}
  }
  raw=''; document.getElementById('review').innerHTML=`<div class="empty">הסקירה עדיין לא הוגדרה או לא נוצרה. יש להריץ Workflow ולבחור review_type: <b>${active}</b>.</div>`; document.getElementById('status').textContent='אין סקירה זמינה לערוץ זה';
}
function setActive(k){active=k; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.k===k)); document.getElementById('runLink').href=ACTIONS_URL; load()}
function buildTabs(){const t=document.getElementById('tabs'); t.innerHTML=''; Object.entries(CHANNELS).forEach(([k,v])=>{const b=document.createElement('button'); b.className='tab'; b.dataset.k=k; b.textContent=v.label; b.onclick=()=>setActive(k); t.appendChild(b)}); setActive(active)}
function fivePoints(){const txt=raw||''; const bullets=[...txt.matchAll(/(?:^|\n)[•-]\s*(.+)/g)].map(m=>m[1].replace(/\*\*/g,'').trim()).filter(Boolean).slice(0,5); if(!bullets.length) return 'אין מספיק נקודות לקיצור.'; return bullets.map((b,i)=>`נקודה ${i+1}: ${b.split('. ')[0].slice(0,180)}`).join('\n');}
function siteUrl(){return location.href.split('#')[0].split('?')[0]}
function whatsapp(){const msg=`${rtlMark}טעימת שוק, ${CHANNELS[active].label}\n\n${fivePoints()}\n\n${rtlMark}לסקירה המלאה:\n${siteUrl()}`; window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank')}
document.getElementById('loadBtn').onclick=load; document.getElementById('pdfBtn').onclick=()=>window.print(); document.getElementById('whatsappBtn').onclick=whatsapp; document.getElementById('shortBtn').onclick=()=>{document.getElementById('review').innerHTML='<h1>קיצור ל-5 נקודות</h1><ul>'+fivePoints().split('\n').map(x=>'<li>'+inline(x)+'</li>').join('')+'</ul>'};
document.getElementById('search').oninput=e=>{const q=e.target.value.trim(); if(!q){render(raw);return} const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'); document.getElementById('review').innerHTML=rendered.replace(re,m=>`<mark>${m}</mark>`)};
buildTabs();
</script>
</body>
</html>
