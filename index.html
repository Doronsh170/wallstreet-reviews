<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>טעימת וול סטריט | Market Desk</title>
  <style>
    :root{--bg:#f4f6f8;--paper:#fff;--ink:#111827;--muted:#667085;--line:#d8dee8;--brand:#073b4c;--brand2:#0b556b;--accent:#0f766e}
    *{box-sizing:border-box;font-family:'Segoe UI',Arial,'Noto Sans Hebrew',Helvetica,sans-serif!important}
    html,body{direction:rtl;text-align:right;unicode-bidi:plaintext}
    body{margin:0;background:var(--bg);color:var(--ink);font-size:16.5px;line-height:1.72;font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    .top{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 16px 14px;border-bottom:4px solid #19a7a5}
    .top-inner{max-width:920px;margin:auto;display:flex;gap:14px;align-items:center;justify-content:space-between}.brand h1{margin:0;font-size:25px;font-weight:800}.brand p{margin:2px 0 0;color:#d7edf2;font-size:14px}.badge{font-size:12px;letter-spacing:.6px;color:#bde7ef}
    .wrap{max-width:920px;margin:0 auto;padding:16px}.paper{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 22px rgba(15,23,42,.06);padding:22px;margin-bottom:18px}.status{color:var(--muted);font-size:14px;margin:4px 0 12px}.headline{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}.headline h1{font-size:25px;line-height:1.3;margin:0;color:#0b2e3b;font-weight:750}.subtle{color:var(--muted);font-size:15px;margin:6px 0 0}.meta{font-size:14px;color:var(--muted);white-space:nowrap;margin-top:4px}
    .review,.preview,.headline,.toolbar,.footer,.review *,.preview *{direction:rtl;text-align:right;unicode-bidi:plaintext}.review h2{font-size:19px;border-top:1px solid var(--line);padding-top:14px;margin:22px 0 12px;color:#0b2e3b;font-weight:750}.review h3{font-size:17.5px;margin:16px 0 5px;color:#0b2e3b;font-weight:700;line-height:1.42}.review p{margin:0 0 14px;font-size:16.5px;line-height:1.75;color:#1f2937;font-weight:400}.preview-title{font-size:22px;margin:0 0 14px;color:#0b2e3b;font-weight:750}.preview ul{margin:0 0 14px;padding:0 24px 0 0}.preview li{margin:0 0 10px;font-size:16.5px;line-height:1.7;color:#1f2937}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 0;border-top:1px solid var(--line);padding-top:14px}.toolbar button,.toolbar a{border:1px solid var(--line);background:#fff;color:#14212f;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-size:15px}.toolbar .primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .footer{font-size:12px;text-align:center;color:#667085;margin:20px 0 8px}.disclaimer{border-top:1px solid var(--line);padding-top:12px;margin-top:16px;color:#4b5563;font-size:13px;text-align:center}.empty{padding:26px;text-align:center;color:var(--muted)}
    @media(max-width:720px){body{font-size:16.5px}.top-inner{display:block}.brand h1{font-size:23px}.wrap{padding:12px}.headline{display:block}.headline h1{font-size:23px}.meta{white-space:normal}.paper{padding:16px;border-radius:14px}.review h2{font-size:19px}.review h3{font-size:17.5px}.review p,.preview li{font-size:16.5px;line-height:1.75}.toolbar{display:grid;grid-template-columns:1fr 1fr}}
    @media print{.top,.toolbar,.status,.read-more{display:none!important}body{background:#fff;font-size:15.5px;line-height:1.65}.wrap{max-width:none;padding:0}.paper{box-shadow:none;border:none}.review p,.preview li{font-size:15.5px;line-height:1.65}.review h2{font-size:18px}.review h3{font-size:16.5px}}
  </style>
</head>
<body>
  <header class="top"><div class="top-inner"><div class="brand"><div class="badge">MARKET DESK CORE</div><h1>טעימת וול סטריט 🌅</h1><p>גרסת Core: תוכן נקי, JSON מובנה ובדיקות לפני פרסום</p></div><div id="updatedTop" class="badge"></div></div></header>
  <main class="wrap">
    <div class="status" id="status">טוען סקירה...</div>
    <article class="paper" id="screen"></article>
    <div class="footer"><div class="disclaimer">⚠️ גילוי נאות: תוכן זה נוצר באמצעות AI לצרכים אינפורמטיביים בלבד. אין באמור ייעוץ השקעות או המלצה לפעולה בניירות ערך.</div><div style="margin-top:8px;font-weight:700">פותח ע"י דורון שרייבמן</div></div>
  </main>
<script>
const JSON_PATH='output/wallstreet/latest.json';
const ACTIONS_URL='https://github.com/Doronsh170/wallstreet-reviews/actions/workflows/check-twitterapi-io.yml';
let meta={}, structured=null, mode='preview';
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function clean(s){return (s||'').toString().replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069\u200B-\u200D\uFEFF\u00AD]/g,'').replace(/#{1,6}/g,'').replace(/\*\*/g,'').replace(/\bנקודה\s*\d+\s*[:.：־\-–—]?\s*/gi,'').replace(/--+/g,',').replace(/[–—]/g,',').replace(/\s+/g,' ').trim()}
function inline(s){return esc(clean(s))}
function created(){const iso=meta.generated_israel||meta.generated_utc||'';if(!iso)return '';try{return new Intl.DateTimeFormat('he-IL',{timeZone:'Asia/Jerusalem',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(iso))}catch(e){return iso.slice(0,16).replace('T',' ')}}
function points(){let p=Array.isArray(structured?.summary_points)?structured.summary_points.map(clean).filter(Boolean):[];if(!p.length&&structured){p=[structured.intro,...(structured.main||[]).map(x=>`${x.heading}: ${x.body}`)].map(clean).filter(Boolean)}return p.slice(0,5)}
function headerHtml(){return `<div class="headline"><div><h1>${inline(structured?.title||'טעימת וול סטריט')}</h1><p class="subtle">${inline(structured?.subtitle||'')}</p></div><div class="meta">${created()?`נוצרה: ${created()}`:''}</div></div>`}
function toolbar(){return `<div class="toolbar"><button class="primary" onclick="mode='full';render()">קריאת הסקירה המלאה</button><a href="${ACTIONS_URL}" target="_blank">יצירת סקירה חדשה</a><button onclick="window.print()">שמירה ל-PDF</button><button onclick="shareWhatsApp()">שליחה בווטסאפ</button></div>`}
function renderPreview(){const ps=points();return `<div class="preview">${headerHtml()}<h2 class="preview-title">תקציר מהיר</h2><ul>${ps.map(x=>`<li>${inline(x)}</li>`).join('')}</ul>${toolbar()}</div>`}
function renderFull(){let html=`<div class="review">${headerHtml()}`;if(structured?.intro)html+=`<p>${inline(structured.intro)}</p>`;if(structured?.main?.length){html+=`<h2>${inline(structured.main_title||'במרכז הפתיחה')}</h2>`;structured.main.forEach(x=>{html+=`<h3>${inline(x.heading)}</h3><p>${inline(x.body)}</p>`})}if(structured?.background?.length){html+=`<h2>${inline(structured.background_title||'ברקע')}</h2>`;structured.background.forEach(x=>{html+=`<h3>${inline(x.heading)}</h3><p>${inline(x.body)}</p>`})}if(structured?.forward?.length&&structured.forward_title){html+=`<h2>${inline(structured.forward_title)}</h2>`;structured.forward.forEach(x=>{html+=`<h3>${inline(x.heading)}</h3><p>${inline(x.body)}</p>`})}if(structured?.bottom_line){html+=`<h2>שורה תחתונה</h2><p>${inline(structured.bottom_line)}</p>`}html+=`<div class="toolbar"><button onclick="mode='preview';render()">חזרה לתקציר</button><a href="${ACTIONS_URL}" target="_blank">יצירת סקירה חדשה</a><button onclick="window.print()">שמירה ל-PDF</button><button onclick="shareWhatsApp()">שליחה בווטסאפ</button></div></div>`;return html}
function render(){document.getElementById('screen').innerHTML=mode==='full'?renderFull():renderPreview();document.getElementById('updatedTop').textContent=created()?`עודכן: ${created()}`:''}
function shareWhatsApp(){const ps=points();const text=['טעימת וול סטריט',...(ps.map(x=>'• '+x)),location.href].join('\n');window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank')}
async function load(){try{const r=await fetch(JSON_PATH+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('לא נמצאה סקירה');meta=await r.json();structured=meta.structured_review;if(!structured)throw new Error('הקובץ לא כולל structured_review');document.getElementById('status').textContent='';render()}catch(e){document.getElementById('status').textContent='שגיאה בטעינת הסקירה';document.getElementById('screen').innerHTML=`<div class="empty">${esc(e.message||String(e))}</div>`}}
load();
</script>
</body>
</html>
